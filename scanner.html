<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patrol QR Scanner</title>
<script>
  window.__jsqrLoadFailed = false;
  function loadScript(src, onSuccess, onFail) {
    const s = document.createElement('script');
    s.src = src;
    s.onload = onSuccess;
    s.onerror = onFail;
    document.head.appendChild(s);
  }
  loadScript(
    "https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js",
    function() { console.log("jsQR loaded from cdnjs"); },
    function() {
      loadScript(
        "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js",
        function() { console.log("jsQR loaded from jsdelivr"); },
        function() {
          loadScript(
            "https://unpkg.com/jsqr@1.4.0/dist/jsQR.min.js",
            function() { console.log("jsQR loaded from unpkg"); },
            function() { window.__jsqrLoadFailed = true; }
          );
        }
      );
    }
  );
</script>
<style>
  html, body {
    margin: 0; height: 100%; background: #111; color: #fff;
    font-family: Arial, sans-serif; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; overflow-x: hidden;
  }
  #scannerContainer { position: relative; width: 100%; max-width: 480px; margin-top: 10px; }
  video { width: 100%; border-radius: 10px; background: #000; display: block; }
  #scanOverlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 200px; height: 200px; border: 3px solid rgba(255,255,255,0.5);
    border-radius: 12px; pointer-events: none; box-shadow: 0 0 0 4000px rgba(0,0,0,0.3);
    transition: border-color 0.2s;
  }
  #scanOverlay .label {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 2px 12px;
    border-radius: 4px; font-size: 12px; white-space: nowrap;
  }
  #status { margin-top: 14px; font-size: 14px; color: #ccc; text-align: center; padding: 0 16px; }
  #lastScan { margin-top: 8px; font-size: 13px; color: #4CAF50; min-height: 18px; }
  button {
    margin-top: 14px; padding: 10px 22px; font-size: 14px; border: none;
    border-radius: 6px; background: #555; color: #fff; cursor: pointer;
  }
  button:disabled { background: #333; cursor: not-allowed; }

  #selfieOverlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #111; z-index: 20; flex-direction: column; align-items: center;
  }
  #selfieOverlay.active { display: flex; }
  #selfieHeader { padding: 14px; font-size: 15px; text-align: center; background: rgba(0,0,0,0.4); width: 100%; box-sizing: border-box; }
  #selfieStage { position: relative; width: 100%; max-width: 480px; }
  #selfieStage video, #selfieStage img {
    width: 100%; border-radius: 10px; background: #000; display: block;
    transform: scaleX(-1);
  }
  #selfieControls { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  #selfieControls button { margin-top: 0; min-width: 110px; }
  #captureBtn { background: #4CAF50; }
  #confirmBtn { background: #2196F3; }
  #retakeBtn { background: #888; }
  #cancelSelfieBtn { background: #e33; }
</style>
</head>
<body>

  <h3 style="margin-bottom:4px;">📷 Patrol Scanner</h3>
  <div id="scannerContainer">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="scanOverlay"><div class="label">Align QR Code</div></div>
  </div>

  <div id="status">Requesting camera access...</div>
  <div id="lastScan"></div>
  <button id="pauseBtn" disabled>⏸ Pause</button>
  <button id="closeScannerBtn" style="background:#e33;">✕ Close Scanner</button>
  <div id="debugInfo" style="margin-top:14px;font-size:11px;color:#777;text-align:center;padding:0 16px;">
    jsQR loaded: <span id="jsqrStatus">checking...</span><br>
    Scans processed: <span id="frameCount">0</span><br>
    Last error: <span id="lastError">none</span>
  </div>

  <div id="selfieOverlay">
    <div id="selfieHeader">📸 Take a selfie to confirm this scan</div>
    <div id="selfieStage">
      <video id="frontVideo" autoplay playsinline muted></video>
      <img id="selfiePreview" style="display:none;">
    </div>
    <div id="selfieControls">
      <button id="captureBtn">📸 Capture</button>
      <button id="confirmBtn" style="display:none;">✅ Confirm</button>
      <button id="retakeBtn" style="display:none;">🔄 Retake</button>
      <button id="cancelSelfieBtn">✕ Cancel Scan</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const TARGET_ORIGIN = "*";
    const REQUIRE_SELFIE = params.get('selfie') === "1";

    const MAX_QR_WIDTH = 480;       // capped canvas width for QR decoding
    const SCAN_INTERVAL_MS = 250;   // only run getImageData()/jsQR ~4x/sec, not every animation frame

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const lastScanEl = document.getElementById('lastScan');
    const overlay = document.getElementById('scanOverlay');
    const pauseBtn = document.getElementById('pauseBtn');
    const closeScannerBtn = document.getElementById('closeScannerBtn');
    const jsqrStatusEl = document.getElementById('jsqrStatus');
    const frameCountEl = document.getElementById('frameCount');
    const lastErrorEl = document.getElementById('lastError');
    let scanCount = 0;

    const jsqrCheckInterval = setInterval(function() {
      if (typeof jsQR !== 'undefined') {
        jsqrStatusEl.textContent = "yes";
        jsqrStatusEl.style.color = "#4CAF50";
        clearInterval(jsqrCheckInterval);
      } else if (window.__jsqrLoadFailed) {
        jsqrStatusEl.textContent = "NO - all CDNs blocked on this network";
        jsqrStatusEl.style.color = "#f44336";
        statusEl.textContent = "❌ QR library could not load. Try a different network or disable content/ad blockers.";
        clearInterval(jsqrCheckInterval);
      }
    }, 300);

    let rearStream = null;
    let frontStream = null;
    let scanning = true;
    let paused = false;
    let pendingToken = null;
    let pendingPhoto = null;
    let scanTimerHandle = null;

    function sendToOpener(message) {
      if (window.opener) {
        window.opener.postMessage(message, TARGET_ORIGIN);
      }
    }

    // ---- Rear camera ----
    function startRearCamera() {
      return navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: MAX_QR_WIDTH },
          height: { ideal: MAX_QR_WIDTH }
        },
        audio: false
      }).then(function(stream) {
        rearStream = stream;
        video.srcObject = stream;
        return new Promise(function(resolve) {
          video.onloadedmetadata = function() {
            video.play();
            resolve();
          };
        });
      });
    }

    // CRITICAL for iOS Safari: stopping the track alone is not enough —
    // the <video> element retains decode buffers until srcObject is
    // explicitly cleared. Skipping this step is what causes memory to
    // climb until WebKit silently kills the page (the "white screen").
    function stopRearCamera() {
      if (rearStream) {
        rearStream.getTracks().forEach(t => t.stop());
        rearStream = null;
      }
      video.srcObject = null;
      if (scanTimerHandle) {
        clearTimeout(scanTimerHandle);
        scanTimerHandle = null;
      }
    }

    function stopFrontCamera() {
      if (frontStream) {
        frontStream.getTracks().forEach(t => t.stop());
        frontStream = null;
      }
      frontVideo.srcObject = null;
    }

    startRearCamera()
      .then(function() {
        statusEl.textContent = "Scanning for checkpoints...";
        pauseBtn.disabled = false;
        sendToOpener({ type: "PATROL_CAMERA_READY" });
        scheduleNextScan();
      })
      .catch(function(err) {
        let msg = err.message;
        if (err.name === 'NotAllowedError') msg = "Camera permission denied. Allow camera access and reopen this window.";
        else if (err.name === 'NotFoundError') msg = "No camera detected on this device.";
        else if (err.name === 'NotReadableError') msg = "Camera is busy or in use by another app.";
        statusEl.textContent = "❌ " + msg;
        sendToOpener({ type: "PATROL_CAMERA_ERROR", message: msg });
      });

    // Throttled scan loop — runs detection at most every SCAN_INTERVAL_MS,
    // instead of every requestAnimationFrame (~60x/sec on iPhone). This is
    // the single biggest reduction in memory/CPU churn on iOS Safari.
    function scheduleNextScan() {
      scanTimerHandle = setTimeout(runScanCheck, SCAN_INTERVAL_MS);
    }

    function runScanCheck() {
      try {
        if (!paused && video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
          const scale = Math.min(1, MAX_QR_WIDTH / video.videoWidth);
          canvas.width = Math.round(video.videoWidth * scale);
          canvas.height = Math.round(video.videoHeight * scale);
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

          if (typeof jsQR === 'undefined') {
            lastErrorEl.textContent = "jsQR library not loaded";
            lastErrorEl.style.color = "#f44336";
          } else {
            const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });
            scanCount++;
            frameCountEl.textContent = scanCount;

            if (code && code.data && scanning) {
              scanning = false;
              pendingToken = code.data;
              overlay.style.borderColor = "#4CAF50";

              if (REQUIRE_SELFIE) {
                statusEl.textContent = "QR detected — confirm with a selfie";
                openSelfieStep();
              } else {
                completeScanWithoutSelfie();
              }
              return; // don't schedule another scan yet — resumes after selfie/confirm
            }
          }
        }
      } catch (err) {
        lastErrorEl.textContent = err.message;
        lastErrorEl.style.color = "#f44336";
      }
      scheduleNextScan();
    }

    // For sites that don't require a selfie — send immediately, then resume scanning
    function completeScanWithoutSelfie() {
      sendToOpener({ type: "PATROL_QR_SCAN", token: pendingToken, photo: "" });
      lastScanEl.textContent = "✅ Scanned: " + pendingToken;
      setTimeout(function() {
        scanning = true;
        pendingToken = null;
        overlay.style.borderColor = "rgba(255,255,255,0.5)";
        lastScanEl.textContent = "";
        scheduleNextScan();
      }, 1200);
    }

    // ============================================================
    //  MANDATORY SELFIE STEP
    // ============================================================

    const selfieOverlay = document.getElementById('selfieOverlay');
    const frontVideo = document.getElementById('frontVideo');
    const selfiePreview = document.getElementById('selfiePreview');
    const captureBtn = document.getElementById('captureBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const cancelSelfieBtn = document.getElementById('cancelSelfieBtn');

    function openSelfieStep() {
      // Release the rear camera fully before opening the front camera —
      // never hold both hardware streams open at once.
      stopRearCamera();

      selfieOverlay.classList.add('active');
      captureBtn.style.display = 'inline-block';
      confirmBtn.style.display = 'none';
      retakeBtn.style.display = 'none';
      selfiePreview.style.display = 'none';
      frontVideo.style.display = 'block';

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'user' }, width: { ideal: MAX_QR_WIDTH } }
      })
        .then(function(stream) {
          frontStream = stream;
          frontVideo.srcObject = stream;
          frontVideo.play();
        })
        .catch(function(err) {
          alert("A front-camera selfie is required to complete this scan, but the camera could not be accessed (" + err.name + "). Please allow camera access and try scanning again.");
          cancelSelfie();
        });
    }

    function captureSelfie() {
      const c = document.createElement('canvas');
      const MAX_SELFIE_WIDTH = 400;
      const scale = Math.min(1, MAX_SELFIE_WIDTH / frontVideo.videoWidth);
      c.width = Math.round(frontVideo.videoWidth * scale);
      c.height = Math.round(frontVideo.videoHeight * scale);

      const cctx = c.getContext('2d');
      cctx.translate(c.width, 0);
      cctx.scale(-1, 1);
      cctx.drawImage(frontVideo, 0, 0, c.width, c.height);

      pendingPhoto = c.toDataURL('image/jpeg', 0.55);
      selfiePreview.src = pendingPhoto;
      selfiePreview.style.display = 'block';
      frontVideo.style.display = 'none';

      captureBtn.style.display = 'none';
      confirmBtn.style.display = 'inline-block';
      retakeBtn.style.display = 'inline-block';
    }

    function retakeSelfie() {
      pendingPhoto = null;
      selfiePreview.style.display = 'none';
      frontVideo.style.display = 'block';
      captureBtn.style.display = 'inline-block';
      confirmBtn.style.display = 'none';
      retakeBtn.style.display = 'none';
    }

    function confirmSelfie() {
      if (!pendingPhoto) return;
      const photo = pendingPhoto;

      sendToOpener({ type: "PATROL_QR_SCAN", token: pendingToken, photo: photo });

      closeSelfieOverlayAndCleanup();
      lastScanEl.textContent = "✅ Scanned with selfie confirmation";
      pendingToken = null;
      pendingPhoto = null;

      // Resume rear camera scanning for the next checkpoint — window stays open.
      startRearCamera()
        .then(function() {
          scanning = true;
          overlay.style.borderColor = "rgba(255,255,255,0.5)";
          statusEl.textContent = "Scanning for checkpoints...";
          setTimeout(function() { lastScanEl.textContent = ""; }, 1500);
          scheduleNextScan();
        })
        .catch(function(err) {
          statusEl.textContent = "❌ Could not restart camera: " + err.message;
        });
    }

    function cancelSelfie() {
      closeSelfieOverlayAndCleanup();
      pendingToken = null;
      pendingPhoto = null;
      scanning = true;
      statusEl.textContent = "Scan cancelled — align QR code to try again";
      overlay.style.borderColor = "rgba(255,255,255,0.5)";

      startRearCamera()
        .then(function() { scheduleNextScan(); })
        .catch(function(err) {
          statusEl.textContent = "❌ Could not restart camera: " + err.message;
        });
    }

    function closeSelfieOverlayAndCleanup() {
      selfieOverlay.classList.remove('active');
      stopFrontCamera();
    }

    captureBtn.addEventListener('click', captureSelfie);
    confirmBtn.addEventListener('click', confirmSelfie);
    retakeBtn.addEventListener('click', retakeSelfie);
    cancelSelfieBtn.addEventListener('click', cancelSelfie);

    pauseBtn.addEventListener('click', function() {
      paused = !paused;
      scanning = true;
      pauseBtn.textContent = paused ? "▶ Resume" : "⏸ Pause";
      statusEl.textContent = paused ? "Scanning paused." : "Scanning for checkpoints...";
      if (!paused) {
        overlay.style.borderColor = "rgba(255,255,255,0.5)";
        lastScanEl.textContent = "";
      }
    });

    closeScannerBtn.addEventListener('click', function() {
      stopRearCamera();
      stopFrontCamera();
      window.close();
    });

    window.addEventListener('message', function(event) {
      if (!event.data) return;
      if (event.data.type === "PATROL_TOGGLE_CAMERA") {
        pauseBtn.click();
      } else if (event.data.type === "PATROL_CLOSE_SCANNER") {
        stopRearCamera();
        stopFrontCamera();
        window.close();
      }
    });

    window.addEventListener('beforeunload', function() {
      stopRearCamera();
      stopFrontCamera();
    });

    window.addEventListener('error', function(e) {
      lastErrorEl.textContent = e.message;
      lastErrorEl.style.color = "#f44336";
    });
  </script>

</body>
</html>
