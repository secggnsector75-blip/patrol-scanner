<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patrol QR Scanner</title>
<script>
  // Load jsQR with a fallback CDN in case the primary one is blocked
  // by a network filter, ad-blocker, or firewall on this device/network.
  window.__jsqrLoadFailed = false;
  function loadScript(src, onSuccess, onFail) {
    const s = document.createElement('script');
    s.src = src;
    s.onload = onSuccess;
    s.onerror = onFail;
    document.head.appendChild(s);
  }
  loadScript(
    "https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js",
    function() { console.log("jsQR loaded from cdnjs"); },
    function() {
      console.log("cdnjs failed, trying jsdelivr...");
      loadScript(
        "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js",
        function() { console.log("jsQR loaded from jsdelivr"); },
        function() {
          console.log("jsdelivr also failed, trying unpkg...");
          loadScript(
            "https://unpkg.com/jsqr@1.4.0/dist/jsQR.min.js",
            function() { console.log("jsQR loaded from unpkg"); },
            function() {
              console.log("All CDNs failed to load jsQR");
              window.__jsqrLoadFailed = true;
            }
          );
        }
      );
    }
  );
</script>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  #scannerContainer {
    position: relative;
    width: 100%;
    max-width: 480px;
    margin-top: 10px;
  }
  video {
    width: 100%;
    border-radius: 10px;
    background: #000;
    display: block;
  }
  #scanOverlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border: 3px solid rgba(255,255,255,0.5);
    border-radius: 12px;
    pointer-events: none;
    box-shadow: 0 0 0 4000px rgba(0,0,0,0.3);
    transition: border-color 0.2s;
  }
  #scanOverlay .label {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 2px 12px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
  }
  #status {
    margin-top: 14px;
    font-size: 14px;
    color: #ccc;
    text-align: center;
    padding: 0 16px;
  }
  #lastScan {
    margin-top: 8px;
    font-size: 13px;
    color: #4CAF50;
    min-height: 18px;
  }
  button {
    margin-top: 14px;
    padding: 10px 22px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    background: #555;
    color: #fff;
    cursor: pointer;
  }
  button:disabled { background: #333; cursor: not-allowed; }
</style>
</head>
<body>

  <h3 style="margin-bottom:4px;">📷 Patrol Scanner</h3>
  <div id="scannerContainer">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="scanOverlay"><div class="label">Align QR Code</div></div>
  </div>

  <div id="status">Requesting camera access...</div>
  <div id="lastScan"></div>
  <button id="pauseBtn" disabled>⏸ Pause</button>
  <div id="debugInfo" style="margin-top:14px;font-size:11px;color:#777;text-align:center;padding:0 16px;">
    jsQR loaded: <span id="jsqrStatus">checking...</span><br>
    Frames scanned: <span id="frameCount">0</span><br>
    Last error: <span id="lastError">none</span>
  </div>

  <script>
    // NOTE: Apps Script serves your page inside a sandboxed iframe on a
    // dynamic domain like "n-xxxxx.script.googleusercontent.com" -- NOT
    // script.google.com itself. Since we can't predict that exact domain,
    // we use "*" here. This is safe because Index.html independently
    // verifies the SENDER's origin (this GitHub Pages site) before
    // trusting any message it receives.
    const TARGET_ORIGIN = "*";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const lastScanEl = document.getElementById('lastScan');
    const overlay = document.getElementById('scanOverlay');
    const pauseBtn = document.getElementById('pauseBtn');
    const jsqrStatusEl = document.getElementById('jsqrStatus');
    const frameCountEl = document.getElementById('frameCount');
    const lastErrorEl = document.getElementById('lastError');
    let frameCount = 0;

    // Poll for jsQR availability since it now loads via async fallback CDNs
    const jsqrCheckInterval = setInterval(function() {
      if (typeof jsQR !== 'undefined') {
        jsqrStatusEl.textContent = "yes";
        jsqrStatusEl.style.color = "#4CAF50";
        clearInterval(jsqrCheckInterval);
      } else if (window.__jsqrLoadFailed) {
        jsqrStatusEl.textContent = "NO - all CDNs blocked on this network";
        jsqrStatusEl.style.color = "#f44336";
        statusEl.textContent = "❌ QR library could not load. Try a different network or disable content/ad blockers.";
        clearInterval(jsqrCheckInterval);
      }
    }, 300);

    let stream = null;
    let scanning = true;   // whether we're actively looking for a new code
    let paused = false;    // whether the user paused scanning
    let lastToken = null;
    let lastTokenTime = 0;

    function sendToOpener(message) {
      if (window.opener) {
        window.opener.postMessage(message, TARGET_ORIGIN);
      }
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });
        video.srcObject = stream;
        video.onloadedmetadata = function() {
          video.play();
          statusEl.textContent = "Scanning for checkpoints...";
          pauseBtn.disabled = false;
          sendToOpener({ type: "PATROL_CAMERA_READY" });
          requestAnimationFrame(scanLoop);
        };
      } catch (err) {
        let msg = err.message;
        if (err.name === 'NotAllowedError') msg = "Camera permission denied. Allow camera access and reopen this window.";
        else if (err.name === 'NotFoundError') msg = "No camera detected on this device.";
        else if (err.name === 'NotReadableError') msg = "Camera is busy or in use by another app.";
        statusEl.textContent = "❌ " + msg;
        sendToOpener({ type: "PATROL_CAMERA_ERROR", message: msg });
      }
    }

    function finishScan() {
      // Stop the camera immediately once a checkpoint is scanned
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      pauseBtn.disabled = true;
      lastScanEl.textContent = "✅ Checkpoint scanned! Closing...";
      statusEl.textContent = "Done. Returning to the Patrol app.";

      // Give postMessage a brief moment to actually deliver, then close.
      setTimeout(function() {
        window.close();
        // If window.close() didn't work (some browsers block it), let the
        // user know they can close it themselves.
        setTimeout(function() {
          statusEl.textContent = "✅ Scanned. You can close this tab now.";
        }, 500);
      }, 600);
    }

    function scanLoop() {
      try {
        if (!paused && video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

          if (typeof jsQR === 'undefined') {
            lastErrorEl.textContent = "jsQR library not loaded";
            lastErrorEl.style.color = "#f44336";
          } else {
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
              inversionAttempts: "attemptBoth"
            });

            frameCount++;
            frameCountEl.textContent = frameCount;

            const now = Date.now();
            if (code && code.data && scanning) {
              lastToken = code.data;
              lastTokenTime = now;
              scanning = false;

              overlay.style.borderColor = "#4CAF50";
              sendToOpener({ type: "PATROL_QR_SCAN", token: code.data });
              finishScan();
              return; // stop this scanLoop invocation, don't schedule another frame
            }
          }
        }
      } catch (err) {
        // Catch any error so a single bad frame can never kill the scan loop
        lastErrorEl.textContent = err.message;
        lastErrorEl.style.color = "#f44336";
      }
      requestAnimationFrame(scanLoop);
    }

    pauseBtn.addEventListener('click', function() {
      paused = !paused;
      scanning = true; // allow detecting a new code again
      pauseBtn.textContent = paused ? "▶ Resume" : "⏸ Pause";
      statusEl.textContent = paused ? "Scanning paused." : "Scanning for checkpoints...";
      if (!paused) {
        overlay.style.borderColor = "rgba(255,255,255,0.5)";
        lastScanEl.textContent = "";
      }
    });

    // Allow the opener to remotely pause/resume or close this window
    window.addEventListener('message', function(event) {
      if (!event.data) return;
      if (event.data.type === "PATROL_TOGGLE_CAMERA") {
        pauseBtn.click();
      } else if (event.data.type === "PATROL_CLOSE_SCANNER") {
        if (stream) stream.getTracks().forEach(t => t.stop());
        window.close();
      }
    });

    // Stop camera cleanly if the user closes this tab/window manually
    window.addEventListener('beforeunload', function() {
      if (stream) stream.getTracks().forEach(t => t.stop());
    });

    startCamera();
  </script>

</body>
</html>
